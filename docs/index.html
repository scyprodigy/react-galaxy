<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>React Galaxy - 元件依賴星系</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a1a; overflow: hidden; }
        #network { width: 100vw; height: 100vh; background: #0a0a1a; }
        
        /* 控制按鈕群組 */
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 30;
            backdrop-filter: blur(4px);
        }
        .controls button {
            background: #1e2a3a;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-family: monospace;
            transition: 0.1s;
        }
        .controls button:hover {
            background: #2d3e4e;
        }
        
        /* 固定節點列表 - 預設右上，手機版改為底部可折疊 */
        .fixed-list {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 12px 16px;
            min-width: 180px;
            max-width: 260px;
            color: #ccc;
            font-size: 11px;
            font-family: monospace;
            border: 1px solid #2a3a4a;
            z-index: 30;
            pointer-events: auto;
            transition: all 0.2s ease;
        }
        .fixed-list h4 {
            margin: 0 0 8px 0;
            font-size: 12px;
            color: #88aaff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .fixed-list h4 .toggle-icon {
            font-size: 12px;
            margin-left: 8px;
        }
        .fixed-list ul {
            margin: 0;
            padding-left: 16px;
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }
        .fixed-list li {
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .fixed-list li:hover {
            color: white;
            text-decoration: underline;
        }
        .fixed-list .unpin-btn {
            background: none;
            border: none;
            color: #ff8888;
            cursor: pointer;
            font-size: 10px;
            margin-left: 8px;
        }
        
        /* 資訊面板 */
        .info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: #eee;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 12px;
            font-family: monospace;
            max-width: 320px;
            backdrop-filter: blur(4px);
            border-left: 4px solid #38bdf8;
            pointer-events: none;
            z-index: 20;
            transition: 0.2s;
        }
        .info-panel h4 { margin: 0 0 6px 0; color: #88aaff; }
        .info-panel p { margin: 4px 0; word-break: break-word; }
        
        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #aaa;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
            pointer-events: none;
            z-index: 20;
        }
        
        /* 響應式：手機版調整佈局 */
        @media (max-width: 768px) {
            .controls {
                top: 10px;
                left: 10px;
                padding: 6px 10px;
                gap: 6px;
            }
            .controls button {
                padding: 3px 8px;
                font-size: 10px;
            }
            .fixed-list {
                top: auto;
                bottom: 10px;
                right: 10px;
                left: 10px;
                max-width: none;
                min-width: auto;
                padding: 8px 12px;
                border-radius: 8px;
            }
            .fixed-list h4 {
                font-size: 11px;
                margin-bottom: 4px;
            }
            .fixed-list ul {
                max-height: 150px;
            }
            .info-panel {
                bottom: 10px;
                left: 10px;
                right: auto;
                max-width: calc(100% - 20px);
                font-size: 10px;
                padding: 8px 12px;
            }
            .status {
                bottom: 10px;
                left: 10px;
                font-size: 8px;
            }
        }
    </style>
    <script type="text/javascript" src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
</head>
<body>
<div id="network"></div>
<div class="controls">
    <button id="resetViewBtn">🔄 重置視角</button>
    <button id="relayoutBtn">✨ 重新布局</button>
    <button id="togglePhysicsBtn">⏸️ 停止物理</button>
</div>
<div class="fixed-list" id="fixedList">
    <h4 id="fixedListHeader">📍 固定節點 <span class="toggle-icon">▼</span></h4>
    <ul id="fixedListItems">
        <li style="color:#666">尚無固定節點</li>
    </ul>
</div>
<div class="info-panel" id="infoPanel">
    <h4>🌌 點擊節點</h4>
    <p>點擊任意元件查看詳細資訊<br>右鍵可固定/解除固定</p>
</div>
<div class="status" id="statusMsg">
    🧠 節點大小 = 行數 | 顏色越紅 = 依賴越多
</div>

<script>
    let network = null;
    let physicsEnabled = true;
    let nodesDataSet = null;
    let edgesDataSet = null;

    // 折疊固定列表（手機上用）
    let fixedListCollapsed = false;
    const fixedListEl = document.getElementById('fixedList');
    const fixedListHeader = document.getElementById('fixedListHeader');
    const fixedListItemsContainer = document.getElementById('fixedListItems');
    function toggleFixedList() {
        fixedListCollapsed = !fixedListCollapsed;
        if (fixedListCollapsed) {
            fixedListItemsContainer.style.display = 'none';
            fixedListHeader.querySelector('.toggle-icon').innerHTML = '▶';
        } else {
            fixedListItemsContainer.style.display = 'block';
            fixedListHeader.querySelector('.toggle-icon').innerHTML = '▼';
        }
    }
    fixedListHeader.addEventListener('click', toggleFixedList);
    // 預設在手機上折疊
    if (window.innerWidth <= 768) {
        fixedListCollapsed = true;
        fixedListItemsContainer.style.display = 'none';
        fixedListHeader.querySelector('.toggle-icon').innerHTML = '▶';
    }

    function updateFixedList() {
        const nodes = nodesDataSet.get();
        const fixedNodes = nodes.filter(n => n.fixed === true);
        const listContainer = document.getElementById('fixedListItems');
        if (fixedNodes.length === 0) {
            listContainer.innerHTML = '<li style="color:#666">尚無固定節點</li>';
            return;
        }
        listContainer.innerHTML = fixedNodes.map(node => `
            <li data-node-id="${node.id}">
                <span>🔒 ${node.label}</span>
                <button class="unpin-btn" data-node-id="${node.id}">解除</button>
            </li>
        `).join('');
        document.querySelectorAll('.unpin-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const nodeId = btn.getAttribute('data-node-id');
                unpinNode(nodeId);
            });
        });
    }

    function unpinNode(nodeId) {
        nodesDataSet.update({ id: nodeId, fixed: false, physics: true });
        updateFixedList();
        document.getElementById('statusMsg').innerHTML = `🔓 已解除固定 ${nodeId}`;
        setTimeout(() => {
            if (document.getElementById('statusMsg').innerHTML.includes('解除固定')) {
                document.getElementById('statusMsg').innerHTML = '✅ 布局穩定，可拖曳節點 | 右鍵固定節點';
            }
        }, 2000);
    }

    function pinNode(nodeId) {
        nodesDataSet.update({ id: nodeId, fixed: true, physics: false });
        updateFixedList();
        document.getElementById('statusMsg').innerHTML = `📍 已固定 ${nodeId}`;
        setTimeout(() => {
            if (document.getElementById('statusMsg').innerHTML.includes('固定')) {
                document.getElementById('statusMsg').innerHTML = '✅ 布局穩定，可拖曳節點 | 右鍵固定節點';
            }
        }, 2000);
    }

    fetch('./galaxy.json')
        .then(res => res.json())
        .then(data => {
            const nodes = [];
            const edges = [];
            const nodeMap = new Map();

            let maxDeps = 0;
            data.forEach(comp => {
                maxDeps = Math.max(maxDeps, comp.dependencies.length);
            });
            if (maxDeps === 0) maxDeps = 1;

            data.forEach(comp => {
                const id = comp.name;
                const deps = comp.dependencies.length;
                const hue = 120 - (deps / maxDeps) * 120;
                nodeMap.set(id, {
                    id: id,
                    label: comp.name,
                    title: `路徑: ${comp.path}\n行數: ${comp.lines}\n依賴: ${comp.dependencies.join(', ') || '無'}`,
                    value: comp.lines,
                    color: {
                        background: `hsl(${hue}, 70%, 55%)`,
                        border: '#ffffff',
                        highlight: {
                            background: `hsl(${hue}, 80%, 65%)`,
                            border: '#ffcc88'
                        }
                    },
                    fixed: false
                });
            });

            for (let node of nodeMap.values()) {
                nodes.push(node);
            }

            data.forEach(comp => {
                const from = comp.name;
                comp.dependencies.forEach(to => {
                    if (nodeMap.has(to)) {
                        edges.push({ from, to, arrows: 'to', smooth: { type: 'curvedCW' }, color: { color: '#88aaff' } });
                    }
                });
            });

            nodesDataSet = new vis.DataSet(nodes);
            edgesDataSet = new vis.DataSet(edges);

            const container = document.getElementById('network');
            const options = {
                nodes: {
                    shape: 'dot',
                    scaling: {
                        min: 12,
                        max: 70,
                        label: { enabled: true, min: 12, max: 28 }
                    },
                    font: { color: '#ffffff', size: 14, face: 'monospace', strokeWidth: 1, strokeColor: '#000000' },
                    borderWidth: 2,
                    shadow: true
                },
                edges: {
                    width: 2,
                    smooth: { type: 'continuous', roundness: 0.5 },
                    arrows: { to: { enabled: true, scaleFactor: 0.8 } }
                },
                physics: {
                    enabled: true,
                    stabilization: { iterations: 300, fit: true },
                    barnesHut: { gravitationalConstant: -6000, centralGravity: 0.2, springLength: 180, springConstant: 0.04, damping: 0.09 }
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200,
                    zoomView: true,
                    dragView: true,
                    dragNodes: true
                }
            };
            network = new vis.Network(container, { nodes: nodesDataSet, edges: edgesDataSet }, options);

            network.once('stabilizationIterationsDone', () => {
                network.setOptions({ physics: { barnesHut: { gravitationalConstant: -4000, springLength: 200 } } });
                document.getElementById('statusMsg').innerHTML = '✅ 布局穩定，可拖曳節點 | 右鍵固定節點';
            });

            network.on('click', (params) => {
                if (params.nodes.length) {
                    const nodeId = params.nodes[0];
                    const node = nodesDataSet.get(nodeId);
                    const depsList = data.find(c => c.name === nodeId)?.dependencies || [];
                    document.getElementById('infoPanel').innerHTML = `
                        <h4>🔍 ${node.label}</h4>
                        <p><strong>路徑：</strong>${node.title.split('\n')[0].replace('路徑: ', '')}</p>
                        <p><strong>行數：</strong>${node.value}</p>
                        <p><strong>依賴：</strong>${depsList.join(', ') || '無'}</p>
                    `;
                }
            });

            network.on('oncontext', (params) => {
                params.event.preventDefault();
                if (params.nodes.length) {
                    const nodeId = params.nodes[0];
                    const node = nodesDataSet.get(nodeId);
                    if (node.fixed) {
                        unpinNode(nodeId);
                    } else {
                        pinNode(nodeId);
                    }
                }
                return false;
            });

            document.getElementById('resetViewBtn').onclick = () => {
                network.fit();
                document.getElementById('statusMsg').innerHTML = '👁️ 視角已重置';
                setTimeout(() => document.getElementById('statusMsg').innerHTML = '✅ 布局穩定，可拖曳節點 | 右鍵固定節點', 1500);
            };
            document.getElementById('relayoutBtn').onclick = () => {
                network.setOptions({ physics: { enabled: true } });
                network.stabilize();
                document.getElementById('statusMsg').innerHTML = '🌀 重新布局中...';
                network.once('stabilizationIterationsDone', () => {
                    network.setOptions({ physics: { barnesHut: { gravitationalConstant: -4000, springLength: 200 } } });
                    document.getElementById('statusMsg').innerHTML = '✅ 布局穩定，可拖曳節點 | 右鍵固定節點';
                });
            };
            document.getElementById('togglePhysicsBtn').onclick = () => {
                physicsEnabled = !physicsEnabled;
                network.setOptions({ physics: { enabled: physicsEnabled } });
                document.getElementById('togglePhysicsBtn').innerHTML = physicsEnabled ? '⏸️ 停止物理' : '▶️ 啟動物理';
                document.getElementById('statusMsg').innerHTML = physicsEnabled ? '⚛️ 物理模擬已開啟' : '🔒 物理模擬已關閉，節點靜止';
                setTimeout(() => {
                    if (document.getElementById('statusMsg').innerHTML.includes('物理')) {
                        document.getElementById('statusMsg').innerHTML = '✅ 布局穩定，可拖曳節點 | 右鍵固定節點';
                    }
                }, 2000);
            };

            updateFixedList();
        })
        .catch(err => {
            console.error(err);
            document.body.innerHTML = '<div style="color:red;padding:20px;text-align:center">❌ 無法載入 galaxy.json，請確認檔案存在且格式正確。</div>';
        });
</script>
</body>
</html>
